[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/airbnb-dashboard.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Daily compliance reminder — 8:00 AM Pacific (15:00 UTC)
[functions."compliance-reminder"]
  schedule = "0 15 * * *"
